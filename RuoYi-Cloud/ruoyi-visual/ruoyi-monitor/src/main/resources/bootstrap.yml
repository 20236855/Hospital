# Tomcat
server:
  port: 9100

# Spring
spring: 
  application:
    # 搴旂敤鍚嶇О
    name: ruoyi-monitor
  profiles:
    # 鐜閰嶇疆
    active: dev
  cloud:
    nacos:
      discovery:
        # 鏈嶅姟娉ㄥ唽鍦板潃
        server-addr: 127.0.0.1:8848
      config:
        encode: GBK
        # 閰嶇疆涓績鍦板潃
        server-addr: 127.0.0.1:8848
  config:
    # 閰嶇疆鏂囦欢鏍煎紡
    file-extension: yml
    import:
      - optional:nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}


