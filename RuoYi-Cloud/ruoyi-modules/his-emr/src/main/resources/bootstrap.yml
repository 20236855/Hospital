# Tomcat
server:
  port: 9213

# Spring
spring:
  application:
    name: his-emr
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        ip: 127.0.0.1
      config:
        encode: GBK
        server-addr: 127.0.0.1:8848
    client:
      ip-address: 127.0.0.1
  config:
    file-extension: yml
    import:
      - optional:nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}

mybatis:
  typeAliasesPackage: com.ruoyi.emr.domain
  mapper-locations: classpath:mapper/**/*.xml

ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    api-url: https://api.deepseek.com/chat/completions
    model: deepseek-chat

management:
  health:
    redis:
      enabled: false
    sentinel:
      enabled: false
