# Tomcat
server:
  port: 8080

# Spring
spring:
  application:
    name: ruoyi-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      routes:
        - id: his-doctor
          uri: lb://his-doctor
          predicates:
            - Path=/hisdoctor/**
          filters:
            - StripPrefix=1
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        # 强制本机注册，避免网关发现错误的内网 IP
        ip: 127.0.0.1
      config:

        encode: GBK
        server-addr: 127.0.0.1:8848
    client:
      ip-address: 127.0.0.1
    sentinel:
      eager: true
      transport:
        dashboard: 127.0.0.1:8718
      datasource:
        ds1:
          nacos:
            server-addr: 127.0.0.1:8848
            dataId: sentinel-ruoyi-gateway
            groupId: DEFAULT_GROUP
            data-type: json
            rule-type: gw-flow
  config:
    file-extension: yml
    import:
      - nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}

management:
  health:
    redis:
      enabled: false
    sentinel:
      enabled: false
